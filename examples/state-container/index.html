<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>state container</title>
</head>
<body>
<counter-display coucou="laurent"></counter-display>
<action-button action="increment"></action-button>
<action-button action="decrement"></action-button>
<script type="module">
    import {component} from '../../src/index.js';
    import {actionButton, counterDisplay} from "./components.js";
    import {connectToStore, withStore} from "./connect";

    customElements.define('counter-display', component(connectToStore(counterDisplay)));
    customElements.define('action-button', component(withStore(actionButton), {
        observedAttributes: ['action']
    }));
</script>
</body>
</html>
