<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>state container</title>
</head>
<body>
<counter-display coucou="laurent"></counter-display>
<action-button action="increment"></action-button>
<action-button action="decrement"></action-button>
<script type="module">
    import {component, compose} from '../../src/index.js';
    import {actionButton, counterDisplay} from "./components.js";
    import {connectToStore, withStore} from "./connect";

    const componentWithStore =compose(component, withStore)
    const connectedComponent = compose(component, connectToStore);

    customElements.define('counter-display', connectedComponent(counterDisplay));
    customElements.define('action-button', componentWithStore(actionButton));
</script>
</body>
</html>
