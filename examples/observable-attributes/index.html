<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>observable attributes</title>
</head>
<body>
<sum-span a="0" b="0"></sum-span>
<label>
    operand A
    <input type="number" id="op-a" value="0">
</label>

<label>
    operand B
    <input type="number" id="op-b" value="0">
</label>
<script type="module">
    import {component} from '../../src/component.js';
    import {sumSpan} from './components.js';

    customElements.define('sum-span', component(sumSpan, {
        observedAttributes: ['a', 'b']
    }));

    const comp = document.querySelector('sum-span');

    document.getElementById('op-a').addEventListener('change', ({target}) => {
        comp.setAttribute('a', target.value)
    })

    document.getElementById('op-b').addEventListener('change', ({target}) => {
        comp.setAttribute('b', target.value)
    })

</script>
</body>
</html>
