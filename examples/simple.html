<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple example</title>
</head>
<body>
<display-number number="42"></display-number>
<button id="unmount">unmount component</button>
<script type="module">
    import {component} from '../src/component.js';

    customElements.define('display-number', component(function* () {
        try {
            const span = document.createElement('span');
            while (true) {
                const {attributes} = yield span;
                span.textContent = attributes.number;
            }
        } finally {
            console.log('unmounted');
        }
    }));

    document.getElementById('unmount').addEventListener('click', () => {
        document.querySelector('display-number').remove();
    })

</script>
</body>
</html>
