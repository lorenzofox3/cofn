<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple example</title>
</head>
<body>
<display-number number="42"></display-number>
<script type="module">
    import {component} from '../src/component.js';

    customElements.define('display-number', component(function* () {
        const span = document.createElement('span');
        while (true) {
            const {attributes} = yield span;
            span.textContent = attributes.number;
        }
    }));
</script>
</body>
</html>
