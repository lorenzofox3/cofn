<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>observable attributes</title>
</head>
<body>
<sum-span a="0" b="0"></sum-span>
<label>
    operand A
    <input type="number" id="op-a" value="0">
</label>

<label>
    operand B
    <input type="number" id="op-b" value="0">
</label>
<script type="module">
    import {component} from '../src/component.js';

    customElements.define('sum-span', component(function* () {
        const span = document.createElement('span');

        while (true) {
            const {attributes} = yield span;
            const {a, b} = attributes
            span.textContent = `${a} + ${b} = ${Number(a) + Number(b)}`;
        }
    }, {
        observedAttributes: ['a', 'b']
    }));

    const sumSpan = document.querySelector('sum-span');

    document.getElementById('op-a').addEventListener('change', ({target}) => {
        sumSpan.setAttribute('a', target.value)
    })

    document.getElementById('op-b').addEventListener('change', ({target}) => {
        sumSpan.setAttribute('b', target.value)
    })

</script>
</body>
</html>
