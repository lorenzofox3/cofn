<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Simple example</title>
</head>
<body>
<magic-button label="click me!"></magic-button>
<button id="unmount">unmount component</button>
<script type="module">
    import {component} from '../src/component.js';

    customElements.define('magic-button', component(function* ({update}) {
        try {
            let clickCount = 0;
            const button = document.createElement('button');

            button.addEventListener('click', () => {
                clickCount++;
                update();
            })

            while (true) {
                const {attributes} = yield button;
                button.textContent = `${attributes.label} (${clickCount})`;
            }
        } finally {
            console.log('unmounted');
        }
    }));

    document.getElementById('unmount').addEventListener('click', () => {
        document.querySelector('magic-button').remove();
    })

</script>
</body>
</html>
